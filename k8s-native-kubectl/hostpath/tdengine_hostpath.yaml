---
# 方案二：手动 PV + hostPath（指定宿主机路径）
# 适用于需要指定数据存储到特定磁盘路径的场景

apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdengine-pv
  labels:
    app: tdengine
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  hostPath:
    path: "/mnt/disk1/k3s/tdengine"     # 宿主机路径，需提前创建
  persistentVolumeReclaimPolicy: Retain   # PVC 删除后 PV 保留

---
# PVC 绑定指定 PV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: taosdata
  namespace: ecloud
  labels:
    app: tdengine
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  volumeName: tdengine-pv                 # 绑定指定 PV
  resources:
    requests:
      storage: 5Gi

---
# Namespace + Service + StatefulSet（使用手动 PVC）
apiVersion: v1
kind: Namespace
metadata:
  name: ecloud
  labels:
    app: tdengine

---
apiVersion: v1
kind: Service
metadata:
  name: tdengine-service
  namespace: ecloud
  labels:
    app: tdengine
spec:
  type: ClusterIP
  selector:
    app: tdengine
  ports:
    - name: tcp6030
      protocol: "TCP"
      port: 6030
    - name: tcp6041
      protocol: "TCP"
      port: 6041
    - name: tcp6060
      protocol: "TCP"
      port: 6060

---
apiVersion: v1
kind: Service
metadata:
  name: tdengine-nodeport
  namespace: ecloud
  labels:
    app: tdengine
spec:
  type: NodePort
  selector:
    app: tdengine
  ports:
    - name: taosadapter-http
      port: 6041
      nodePort: 30441
      protocol: TCP
    - name: taosd-tcp
      port: 6030
      nodePort: 30603
      protocol: TCP
    - name: taosexplorer-http
      port: 6060
      nodePort: 30660
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tdengine
  namespace: ecloud
  labels:
    app: tdengine
spec:
  serviceName: tdengine-service
  replicas: 1
  selector:
    matchLabels:
      app: tdengine
  template:
    metadata:
      labels:
        app: tdengine
    spec:
      containers:
        - name: tdengine
          image: tdengine/tsdb:3.4.1.13
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp6030
              protocol: "TCP"
              containerPort: 6030
            - name: tcp6041
              protocol: "TCP"
              containerPort: 6041
            - name: tcp6060
              protocol: "TCP"
              containerPort: 6060
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SERVICE_NAME
              value: "tdengine-service"
            - name: STS_NAME
              value: "tdengine"
            - name: STS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TZ
              value: "UTC"
            - name: TAOS_SERVER_PORT
              value: "6030"
            - name: TAOS_FIRST_EP
              value: "$(STS_NAME)-0.$(SERVICE_NAME).$(STS_NAMESPACE).svc.cluster.local:$(TAOS_SERVER_PORT)"
            - name: TAOS_FQDN
              value: "$(POD_NAME).$(SERVICE_NAME).$(STS_NAMESPACE).svc.cluster.local"
            - name: TAOS_CLUSTER
              value: "0"
            - name: TAOS_DEBUG_FLAG
              value: "131"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: taosdata
              mountPath: /var/lib/taos
              subPath: data
            - name: taosdata
              mountPath: /var/log/taos
              subPath: log
            - name: taosconfig
              mountPath: /etc/taos/
              readOnly: true
          startupProbe:
            exec:
              command:
                - taos-check
                - startup
            failureThreshold: 360
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - taos-check
                - service
            initialDelaySeconds: 5
            timeoutSeconds: 5000
          livenessProbe:
            exec:
              command:
                - taos-check
                - service
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: taosdata
          persistentVolumeClaim:
            claimName: taosdata
        - name: taosconfig
          configMap:
            name: tdengine-config
            defaultMode: 0644
