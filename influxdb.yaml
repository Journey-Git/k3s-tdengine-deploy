apiVersion: v1
kind: PersistentVolume
metadata:
  name: influxdb-pv
  namespace: ecloud
spec:
  capacity:
    storage: 5Gi
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath: 
    path: "/mnt/disk1/k3s/influxdb"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: ecloud
spec:
  selector:
    matchLabels:
      app: influxdb
  serviceName: influxdb
  replicas: 1
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
      - name: influxdb
        image: influxdb:1.8.10
        env:
          - name: TZ
            value: "Asia/Shanghai"
          - name: NFLUXDB_REPORTING_DISABLED
            value: "true"
          - name: INFLUXDB_HTTP_FLUX_ENABLED
            value: "true"
          - name: INFLUXDB_HTTP_LOG_ENABLED
            value: "false"
          - name: INFLUXDB_HTTP_ACCESS_LOG_PATH
            value: "/var/lib/influxdb/influxdb_http.log"
          - name: INFLUXDB_RETENTION_ENABLED
            value: "true"
          - name: INFLUXDB_RETENTION_CHECK_INTERVAL
            value: "8h"
          - name: INFLUXDB_DB #使用此环境变量的名称自动初始化数据库。
            value: "health"
          - name: INFLUXDB_HTTP_AUTH_ENABLED #启用身份验证。必须设置或必须在配置文件中设置此选项，才能使以下任何与身份验证相关的选项正常工作。
            value: "true"
          - name: INFLUXDB_ADMIN_USER #要创建的管理员用户的名称。如果未设置，则不会创建管理员用户。
            value: "admin"
          - name: INFLUXDB_ADMIN_PASSWORD #使用INFLUXDB_ADMIN_USER配置的管理员用户的密码。如果未设置，则会生成一个随机密码并将其打印为标准输出。
            value: "E2a3X4h5U*w4A2X6D4"
        ports:
          - containerPort: 8086
        volumeMounts:
        - name: influxdb-pvc
          mountPath: /root/.influxdb
          subPath: data
        - name: influxdb-pvc
          mountPath: /var/lib/influxdb
          subPath: data
        - name: influxdb-pvc
          mountPath: /etc/influxdb
          subPath: config
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
        livenessProbe:
          tcpSocket:                  # TCP
            port: 8086                # 端口
          initialDelaySeconds: 60    # 延迟探测时间(秒) 【 在k8s第一次探测前等待秒 】
          periodSeconds: 10          # 执行探测频率(秒) 【 每隔秒执行一次 】
          timeoutSeconds: 2          # 超时时间
          successThreshold: 1        # 健康阀值 
          failureThreshold: 3
        readinessProbe:
          tcpSocket:                  # TCP
            port: 8086
          initialDelaySeconds: 10    # 延迟探测时间(秒) 【 在k8s第一次探测前等待秒 】
          periodSeconds: 10          # 执行探测频率(秒) 【 每隔秒执行一次 】
          timeoutSeconds: 2          # 超时时间
          successThreshold: 1        # 健康阀值 
          failureThreshold: 3

  volumeClaimTemplates:
  - metadata:
      name: influxdb-pvc
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: ecloud
  labels:
    app: influxdb
spec:
  type: NodePort
  ports:
  - name: influxdb
    port: 8086
    nodePort: 8086
  selector:
    app: influxdb
